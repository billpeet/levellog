services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: /app/data/app.db
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - levellog-data:/app/data
    restart: unless-stopped

volumes:
  levellog-data:
