<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f1ecde" />
		<title>Offline · LevelLog</title>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<style>
			:root {
				color-scheme: light;
				--ink: #0f100e;
				--graphite: #6e6a5c;
				--paper: #f1ecde;
				--vellum: #faf6eb;
				--rule: #c8bfa6;
				--accent: #e5532d;
			}
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: var(--paper);
				color: var(--ink);
				font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
				-webkit-font-smoothing: antialiased;
			}
			main {
				min-height: 100dvh;
				display: grid;
				place-items: center;
				padding: 2rem;
			}
			.card {
				max-width: 28rem;
				width: 100%;
				background: var(--vellum);
				border: 1px solid var(--rule);
				padding: 2rem;
				border-radius: 4px;
			}
			.eyebrow {
				font-family: 'JetBrains Mono', ui-monospace, monospace;
				font-size: 0.6875rem;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: var(--graphite);
				margin: 0 0 0.75rem;
			}
			h1 {
				font-family: 'Instrument Serif', 'Times New Roman', serif;
				font-weight: 400;
				font-size: 2rem;
				margin: 0 0 0.75rem;
				line-height: 1.1;
			}
			p {
				color: var(--graphite);
				line-height: 1.5;
				margin: 0 0 1.25rem;
			}
			button {
				appearance: none;
				background: var(--ink);
				color: var(--paper);
				border: 0;
				padding: 0.625rem 1rem;
				font: inherit;
				cursor: pointer;
				border-radius: 2px;
			}
			button:hover {
				background: var(--accent);
			}
			.dot {
				display: inline-block;
				width: 0.5rem;
				height: 0.5rem;
				background: var(--accent);
				border-radius: 999px;
				margin-right: 0.4rem;
				vertical-align: 1px;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="card">
				<p class="eyebrow"><span class="dot"></span>Offline</p>
				<h1>You're off the network.</h1>
				<p>
					LevelLog needs a connection to load projects and save readings. Your last cached
					screens may still be available — try going back, or retry once you're back on
					signal.
				</p>
				<button type="button" onclick="location.reload()">Retry</button>
			</div>
		</main>
	</body>
</html>
